kind = "mobile"
previewPath = "/"
title = "Neighborly"
version = "1.0.0"
id = "artifacts/neighborly"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20009

[services.development]
run = "pnpm --filter @workspace/neighborly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neighborly", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/neighborly", "run", "serve" ]

[services.env]
PORT = "20009"
BASE_PATH = "/"
